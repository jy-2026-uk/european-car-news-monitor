name: Daily Auto Market Report

on:
  schedule:
    - cron: '0 8 * * *' # 每天北京时间16:00运行 (UTC 8:00)
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py > report.md

      - name: Save history # 将更新后的历史记录存回仓库以实现跨天去重
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.json
          git commit -m "Update scraping history [skip ci]" || echo "No changes"
          git push
